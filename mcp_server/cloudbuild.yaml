# Cloud Build config for the MCP server image.
#
# Per-service config + Dockerfile live IN their subdirectory (this one in
# `mcp_server/`); the build itself still runs from the repo root so the image
# can COPY shared code (`services/`, `schemas/`). Invoked by `make deploy-mcp`:
#   gcloud builds submit --config mcp_server/cloudbuild.yaml \
#     --substitutions _IMAGE_TAG=us-central1-docker.pkg.dev/<project>/cloud-run-source-deploy/truthfulness-mcp:latest .
#
# The resulting image is pushed to Artifact Registry; `gcloud run deploy --image`
# then points the Cloud Run service at it.

steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-f'
    - 'mcp_server/Dockerfile'
    - '-t'
    - '${_IMAGE_TAG}'
    - '.'

images:
- '${_IMAGE_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY
