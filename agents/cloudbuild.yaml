# Cloud Build config for the Orchestrator agent image.
#
# The orchestrator lives at `agents/agent.py` (root of `agents/`, not in its
# own subdirectory), so its Dockerfile and cloudbuild sit alongside it at
# `agents/Dockerfile` and `agents/cloudbuild.yaml`. The build itself still
# runs from the repo root so the image can COPY repo-rooted paths
# (`agents/__init__.py`, `agents/agent.py`, sub-agent client modules).
# Invoked by `make deploy-orchestrator`:
#   gcloud builds submit --config agents/cloudbuild.yaml \
#     --substitutions _IMAGE_TAG=us-central1-docker.pkg.dev/<project>/cloud-run-source-deploy/truthfulness-orchestrator:latest .
#
# The resulting image is pushed to Artifact Registry; `gcloud run deploy --image`
# then points the Cloud Run service at it.

steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-f'
    - 'agents/Dockerfile'
    - '-t'
    - '${_IMAGE_TAG}'
    - '.'

images:
- '${_IMAGE_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY