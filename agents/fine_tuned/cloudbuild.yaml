# Cloud Build config for the Fine-tuned Predictor agent image.
#
# Per-service config + Dockerfile live IN their subdirectory (this one in
# `agents/fine_tuned/`); the build itself still runs from the repo root so the
# image can COPY repo-rooted paths (`agents/__init__.py`, `agents/fine_tuned/`).
# Invoked by `make deploy-fine-tuned`:
#   gcloud builds submit --config agents/fine_tuned/cloudbuild.yaml \
#     --substitutions _IMAGE_TAG=us-central1-docker.pkg.dev/<project>/cloud-run-source-deploy/truthfulness-fine-tuned:latest .
#
# The resulting image is pushed to Artifact Registry; `gcloud run deploy --image`
# then points the Cloud Run service at it.

steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-f'
    - 'agents/fine_tuned/Dockerfile'
    - '-t'
    - '${_IMAGE_TAG}'
    - '.'

images:
- '${_IMAGE_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY
