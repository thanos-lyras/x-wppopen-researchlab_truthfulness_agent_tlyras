# Cloud Build config — explicit so we can use a non-standard Dockerfile name
# (`Dockerfile.mcp`). Invoked by `make deploy-mcp` via:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions _IMAGE_TAG=us-central1-docker.pkg.dev/<project>/cloud-run-source-deploy/truthfulness-mcp:latest .
#
# The resulting image is pushed to Artifact Registry; `gcloud run deploy --image`
# then points the Cloud Run service at it.

steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-f'
    - 'Dockerfile.mcp'
    - '-t'
    - '${_IMAGE_TAG}'
    - '.'

images:
- '${_IMAGE_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY
